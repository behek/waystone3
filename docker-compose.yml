services:
  postgres:
    image: postgres:15-alpine
    container_name: bird_updater_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bird_updater_app
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /etc/bird/protocols:/etc/bird/protocols
      - /etc/bird/backups:/etc/bird/backups
      - /home/mcp/blacklists/AS_Network_List:/opt/AS_Network_List:ro
      - ./app:/opt/app
    command: python /opt/app/scheduler.py

volumes:
  postgres_data:
